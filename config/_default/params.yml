projects:
  - name: 基于H323协议的能力交换平台开发
    contribution: 负责人
    description: |
      本项目是为了解决本公司的私有协议终端与其他厂商的 H323 终端的互联互通的问题，实现邀请或参加跨云会议。
      项目采取背靠背结构完成媒体在双方终端之间的转换与转发，主要有以下几个服务：
          1. 信令网关，负责 H323 协议的对接；
          2. 媒体网关，负责媒体的转码与转发；
          3. 消息队列，负责网关之间的消息通讯；
      个人职责：
          1. 信令网关/媒体网关的设计与开发；
          2. 网关的测试与部署；
          3. 与其他厂商的对接；
          4. 功能的迭代与代码的性能优化
          5. 编写相关的项目文档；
      项目业绩：
          目前为止网关已接通华为、中兴、思科、科达、易联等多家厂商的 H323 终端，并满足单机情况下100终端参会稳定运行。

  - name: 会议云中心能力平台开发
    contribution: 负责人
    description: |
      该项目是公司所有产品的中心能力平台的维护与迭代。
      个人职责： 
          1. 主要工具的迭代与维护(文件传输、质量汇报、网络探测、服务控制等)； 
          2. 多平台的 SDK 的迭代与维护； 
          3. CI/CD 平台的搭建与推广； 
          4. 所维护模块的单元测试代码编写；
    
  - name: "课堂中心能力交换平台开发"
    contribution: 开发人员
    description: |
      该项目是为某省推进“教育扶贫”所开发的 SIP 能力交换平台，使其能够完成不同终端间信令协商与媒体交换，以及不同厂商的终端跨云参加同一会议。
      项目同样采取了背靠背结构来实现，除此还有以下功能：
          1. 支持多机部署、故障转移、故障恢复，以此实现了网关的高可用；
          2. 网关进行核心与线程的分配，提高机器 CPU 的使用率，以此增加单机负载能力与并发量；
      个人职责：
          1. 参与中心能力平台的设计；
          2. 基于 ActiveMQ 的内部通讯模块开发；
          3. 信令网关（SIP）/媒体网关（RTP）的开发；
          4. 基于 hiredis 接口的封装；
          5. 基于 WebRTC 中 ulpfec 的 SDK 开发；
          6. 现场对接与交付
    
  - name: 基于图像的三维重建系统研发
    contribution: 负责人
    description: |
      该项目是针对当前公司在扫描模型时流程繁琐和扫描时间过长，被扫描演员会抖动导致的模型变 形等问题，提出的一套简洁、健壮的半自动解决方案。 
      个人职责：
          1. 对采集到的 RGB 图像去畸变（张正友棋盘格标定）；
          2. 使用 openMVG 与 openMVG 进行点云重建；
          3. 将点云重建流程编写成 Meshlab 插件，集成到其中。
          4. 研究常见的点云三维重建算法原理 (MC，泊松重建等)，对比效果后选用泊松重建算法；
          5. 使用 Win32+OpenGL 搭建交互界面，具有加载、预览、交互、重建、保存等功能；
          6. 使用 SIFT+RANSAC 算法重建图像间的拓扑关系，根据权重函数确定图像的来源完成映射；
    
  - name: 动作捕捉
    contribution: 参与者
    description: 基于图像的演员动作捕捉系统。主要负责协助算法工程师，搭建caffe深度学习框架，以及模型的训练和部分编码
    